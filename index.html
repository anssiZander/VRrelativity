<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relativistic Observer XR Demo</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #05070b;
        color: #f2f6ff;
        font-family: Arial, Helvetica, sans-serif;
      }

      #cameraFeed {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: none;
        object-fit: cover;
        pointer-events: none;
        z-index: 0;
        background: #05070b;
      }

      #app {
        position: fixed;
        inset: 0;
        z-index: 1;
      }

      #overlayRoot {
        position: fixed;
        inset: 0;
        z-index: 20;
        pointer-events: none;
      }

      #overlayRoot > * {
        pointer-events: auto;
      }

      #buttonDock {
        position: fixed;
        right: 12px;
        bottom: 12px;
        display: grid;
        justify-items: end;
        gap: 10px;
      }

      .floating-button {
        padding: 12px 16px;
        border: 0;
        border-radius: 999px;
        background: rgba(20, 122, 255, 0.92);
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.30);
      }

      .floating-button:disabled {
        opacity: 0.6;
        cursor: default;
      }

      #panel {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: min(380px, calc(100vw - 24px));
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(8, 12, 18, 0.78);
        backdrop-filter: blur(8px);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
        line-height: 1.35;
        display: flex;
        flex-direction: column;
      }

      #panel h1 {
        margin: 0;
        font-size: 18px;
      }

      .panel-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .panel-title {
        flex: 1 1 auto;
      }

      .panel-body {
        display: block;
      }

      .panel-toggle-button {
        flex: 0 0 auto;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.08);
        color: #f2f6ff;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      .panel-toggle-button:hover {
        background: rgba(255, 255, 255, 0.14);
      }

      .row {
        margin-top: 10px;
      }

      .label-line {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 4px;
        font-size: 14px;
      }

      input[type="range"] {
        width: 100%;
      }

      .toggle-stack {
        display: grid;
        gap: 8px;
      }

      .small {
        margin-top: 10px;
        font-size: 12px;
        color: #c4cfdf;
      }

      .scene-button {
        width: 100%;
        padding: 10px 14px;
        border-radius: 10px;
        border: none;
        color: white;
        background: rgba(20, 122, 255, 0.92);
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
      }

      .scene-button:hover {
        background: rgba(26, 145, 255, 0.96);
      }

      .kbd {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      a {
        color: #a9d1ff;
      }

      #panel.hidden {
        display: none;
      }

      #panel.panel-collapsed {
        width: min(320px, calc(100vw - 24px));
      }

      #panel.panel-collapsed .panel-header {
        margin-bottom: 0;
      }

      #panel.panel-collapsed .panel-body {
        display: none;
      }
    </style>
  </head>
  <body>
    <video id="cameraFeed" autoplay muted playsinline></video>
    <div id="app"></div>

    <div id="overlayRoot">
      <div id="panel" aria-label="desktop-controls">
        <div class="panel-header">
          <h1 class="panel-title">Relativistic observer XR demo</h1>
          <button id="panelMinimizeButton" class="panel-toggle-button" type="button" aria-expanded="true" aria-controls="panelBody">
            Minimize
          </button>
        </div>

        <div id="panelBody" class="panel-body">
          <div class="row">
            <div class="label-line">
              <span>&beta; = v/c</span>
              <span id="betaValue">0.80</span>
            </div>
            <input id="betaSlider" type="range" min="0" max="0.99" step="0.01" value="0.80" />
          </div>

          <div class="row toggle-stack">
            <label>
              <input id="lorentzToggle" type="checkbox" checked />
              Enable Lorentz transform (length contraction)
            </label>
            <label>
              <input id="aberrationToggle" type="checkbox" checked />
              Enable aberration (retarded position)
            </label>
          </div>

          <div class="row">
            <button id="sceneToggle" class="scene-button" type="button">Switch to cube grid scene</button>
          </div>
          <div class="row">
            <button id="sceneEyeButton" class="scene-button" type="button">Switch to eye-relative scene</button>
          </div>

          <div class="small">
            Desktop: click the scene, then use <span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span> to move,
            <span class="kbd">Q</span>/<span class="kbd">E</span> up/down, mouse to look, <span class="kbd">Shift</span> to boost, <span class="kbd">Esc</span> to release mouse.
          </div>
        
          <div class="small">
            VR: Left thumbstick = move/strafe in headset look direction, right thumbstick = turn + vertical fly.
          </div>
        </div>
      </div>

      <div id="buttonDock" aria-label="xr-actions"></div>
    </div>

    <script type="module" src="./main.js?v=11"></script>
  </body>
</html>
